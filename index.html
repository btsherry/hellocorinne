<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Corinne</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Georgia, serif;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
        }
        h1 {
            font-size: 4rem;
            color: #880e4f;
            margin-bottom: 0.5em;
        }
        .poem {
            max-width: 500px;
            text-align: center;
            color: #4a1942;
            font-size: 1.25rem;
            line-height: 1.8;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Corinne</h1>
        <div class="poem">
            <p>
                You are the warmth before the words,<br>
                the pause that makes the music whole,<br>
                the quiet light in crowded rooms<br>
                that finds its way into my soul.
            </p>
            <p>
                Of all the luck the world could lend,<br>
                the greatest was that you walked in,<br>
                and every day since then has been<br>
                a love letter without an end.
            </p>
        </div>
    </div>
</body>
</html>
